# GeoNexus Kubernetes 部署配置
# 使用: kubectl apply -f geonexus.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: geonexus
  labels:
    app: geonexus
    environment: production

---
# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: geonexus-config
  namespace: geonexus
data:
  # Java应用配置
  APPLICATION_YML: |
    spring:
      application:
        name: geonexus
      profiles:
        active: k8s
      datasource:
        url: jdbc:postgresql://geonexus-postgres:5432/geonexus
        username: geonexus
        password: ${DB_PASSWORD}
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
      data:
        redis:
          host: geonexus-redis
          port: 6379
    geoserver:
      url: http://geonexus-geoserver:8080/geoserver
    llm:
      openai:
        api-key: ${OPENAI_API_KEY}
      anthropic:
        api-key: ${ANTHROPIC_API_KEY}
    jwt:
      secret: ${JWT_SECRET}
  # Nginx配置
  NGINX_CONF: |
    worker_processes auto;
    worker_rlimit_nofile 65535;
    
    events {
        worker_connections 4096;
        multi_accept on;
        use epoll;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        # 日志格式
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';
        
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;
        
        # 性能优化
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        
        # Gzip压缩
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript 
                    application/xml application/xml+rss text/javascript application/x-javascript;
        
        # 上传大小
        client_max_body_size 100M;
        
        # 代理配置
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

---
# Secret - 敏感信息
apiVersion: v1
kind: Secret
metadata:
  name: geonexus-secrets
  namespace: geonexus
type: Opaque
stringData:
  DB_PASSWORD: CHANGE_ME_postgres_password
  JWT_SECRET: CHANGE_ME_very_long_jwt_secret_key_256bit
  OPENAI_API_KEY: CHANGE_ME_openai_api_key
  ANTHROPIC_API_KEY: CHANGE_ME_anthropic_api_key

---
# PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: geonexus-postgres
  namespace: geonexus
spec:
  serviceName: geonexus-postgres
  replicas: 1
  selector:
    matchLabels:
      app: geonexus-postgres
  template:
    metadata:
      labels:
        app: geonexus-postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:15-3.3
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: geonexus
            - name: POSTGRES_USER
              value: geonexus
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geonexus-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "geonexus"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "geonexus"]
            initialDelaySeconds: 5
            periodSeconds: 5
          # 备份
          envFrom:
            - configMapRef:
                name: geonexus-config
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geonexus-redis
  namespace: geonexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geonexus-redis
  template:
    metadata:
      labels:
        app: geonexus-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --maxmemory
            - 512mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5

---
# GeoServer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geonexus-geoserver
  namespace: geonexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geonexus-geoserver
  template:
    metadata:
      labels:
        app: geonexus-geoserver
    spec:
      containers:
        - name: geoserver
          image: geoserver/cloud-restlet:2.23.0
          ports:
            - containerPort: 8080
              name: geoserver
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          env:
            - name: GEOSERVER_DATA_DIR
              value: /opt/geoserver/data_dir
            - name: JAVA_OPTS
              value: "-Xmx3g -Xms1g -Dorg.geotools.shapefile.cache=false"
          livenessProbe:
            httpGet:
              path: /geoserver/rest/about
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /geoserver/rest/about
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: geoserver-data
              mountPath: /opt/geoserver/data_dir
      volumes:
        - name: geoserver-data
          persistentVolumeClaim:
            claimName: geoserver-data

---
# PVC for GeoServer
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoserver-data
  namespace: geonexus
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi

---
# Backend API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geonexus-api
  namespace: geonexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geonexus-api
  template:
    metadata:
      labels:
        app: geonexus-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - geonexus-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: geonexus/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: api
          envFrom:
            - configMapRef:
                name: geonexus-config
            - secretRef:
                name: geonexus-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      volumes:
        - name: upload-data
          emptyDir: {}
          # 生产环境使用PVC
          # persistentVolumeClaim:
          #   claimName: uploads

---
# Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geonexus-frontend
  namespace: geonexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geonexus-frontend
  template:
    metadata:
      labels:
        app: geonexus-frontend
    spec:
      containers:
        - name: frontend
          image: geonexus/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geonexus-ingress
  namespace: geonexus
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # 速率限制
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - geonexus.ai
        - api.geonexus.ai
        - geoserver.geonexus.ai
      secretName: geonexus-tls
  rules:
    - host: geonexus.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: geonexus-frontend
                port:
                  number: 80
    - host: api.geonexus.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: geonexus-api
                port:
                  number: 8000
    - host: geoserver.geonexus.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: geonexus-geoserver
                port:
                  number: 8080

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: geonexus-api
  namespace: geonexus
spec:
  selector:
    app: geonexus-api
  ports:
    - port: 8000
      targetPort: 8000
      name: api
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: geonexus-frontend
  namespace: geonexus
spec:
  selector:
    app: geonexus-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: geonexus-postgres
  namespace: geonexus
spec:
  clusterIP: None
  selector:
    app: geonexus-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: geonexus-redis
  namespace: geonexus
spec:
  selector:
    app: geonexus-redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: geonexus-geoserver
  namespace: geonexus
spec:
  selector:
    app: geonexus-geoserver
  ports:
    - port: 8080
      targetPort: 8080

---
# HPA - 自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geonexus-api-hpa
  namespace: geonexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geonexus-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: geonexus-api-pdb
  namespace: geonexus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: geonexus-api

---
# ServiceMonitor - Prometheus监控
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: geonexus-api-monitor
  namespace: geonexus
  labels:
    team: platform
spec:
  selector:
    matchLabels:
      app: geonexus-api
  endpoints:
    - port: api
      path: /actuator/prometheus
      interval: 15s
